<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection - SPECTRE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <!-- Header -->
        <header class="header">
            <div class="profile-section">
                <div class="profile-image-container">
                    <img src="assets/images/logo.png" alt="SPECTRE" class="profile-image" id="profileImage">
                    <div class="profile-ring"></div>
                </div>
                <h1 class="brand-title">SPECTRE</h1>
                <p class="hero-subtitle">BUILT DIFFERENT.</p>
                <p class="hero-tagline">WORN FEARLESSLY.</p>
            </div>
        </header>

        <!-- Collection Section -->
        <section class="collection-section">
            <div class="divider">━━━━━━━━━━━━━━━━</div>
            <h2 class="section-title">SHOP COLLECTION</h2>
            <p class="collection-subtitle">Choose your platform</p>
            
            <div class="platform-grid">
                <a href="#" class="platform-card" data-link="explore_collection" target="_blank" rel="noopener">
                    <div class="platform-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 3h18v18H3zM9 9h6M9 12h6M9 15h3"/>
                        </svg>
                    </div>
                    <div class="platform-info">
                        <h3 class="platform-name">Shopee</h3>
                        <p class="platform-description">Official Store</p>
                    </div>
                    <div class="platform-arrow">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </div>
                </a>

                <a href="#" class="platform-card" data-link="tiktok_shop" target="_blank" rel="noopener">
                    <div class="platform-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/>
                        </svg>
                    </div>
                    <div class="platform-info">
                        <h3 class="platform-name">TikTok Shop</h3>
                        <p class="platform-description">Official Store</p>
                    </div>
                    <div class="platform-arrow">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </div>
                </a>

                <a href="#" class="platform-card" data-link="instagram" target="_blank" rel="noopener">
                    <div class="platform-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                        </svg>
                    </div>
                    <div class="platform-info">
                        <h3 class="platform-name">Instagram</h3>
                        <p class="platform-description">Follow @SPECTRE_SKATEBOARD</p>
                    </div>
                    <div class="platform-arrow">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </div>
                </a>
            </div>
            
            <div class="divider">━━━━━━━━━━━━━━━━</div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-social">
                <a href="#" class="footer-social-link" data-link="direct_contact" target="_blank" rel="noopener" aria-label="WhatsApp">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                    </svg>
                </a>
            </div>
            <p class="footer-text">&copy; 2025 SPECTRE</p>
            <p class="footer-tagline">Built Different. Worn Fearlessly.</p>
        </footer>
    </main>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
