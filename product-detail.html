<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- Primary Meta Tags -->
    <title>PRODUCT DETAIL | SPECTRE</title>
    <meta name="title" content="PRODUCT DETAIL | SPECTRE">
    <meta name="description" content="SPECTRE Product Detail - View product details and order from Shopee. Built Different. Worn Fearlessly.">
    <meta name="keywords" content="SPECTRE, spectreskate, skateboarding, streetwear, skate decks, premium streetwear, product detail">
    <meta name="author" content="SPECTRE">
    
    <!-- Favicon -->
    <!-- TODO: Create favicon files after updating main logo to dark charcoal (#111111) on transparent background -->
    
    <!-- CSS -->
    <link rel="stylesheet" href="product-detail.css">
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen">
        <div class="loading-content">
            <div class="loading-logo-container">
                <img src="assets/images/logo.png" alt="SPECTRE" class="loading-logo">
                <div class="loading-ring"></div>
            </div>
            <div class="loading-text">
                <p class="loading-line-1">BUILT DIFFERENT.</p>
                <p class="loading-line-2">WORN FEARLESSLY.</p>
            </div>
            <div class="loading-bar-container">
                <div class="loading-bar"></div>
            </div>
            <p class="loading-status">ENTERING THE VOID...</p>
        </div>
    </div>

    <!-- Background Effects -->
    <div class="background-effects">
        <div class="glow-effect"></div>
        <div class="particles" id="particles"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <header class="detail-header">
            <div class="header-nav">
                <a href="catalog.html" class="back-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    <span>BACK TO CATALOG</span>
                </a>
                <h1 class="detail-title">PRODUCT DETAIL</h1>
                <div class="header-spacer"></div>
            </div>
        </header>

        <!-- Product Detail Section -->
        <section class="product-detail-section">
            <div class="product-detail-container" id="productDetailContainer">
                <!-- Product details will be loaded dynamically -->
            </div>
        </section>

        <!-- Footer -->
        <footer class="detail-footer">
            <div class="footer-social">
                <a href="#" class="footer-social-link" data-link="instagram" target="_blank" rel="noopener" aria-label="Instagram">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                </a>
                <a href="#" class="footer-social-link" data-link="direct-contact" target="_blank" rel="noopener" aria-label="WhatsApp">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                    </svg>
                </a>
            </div>
            <p class="footer-text">&copy; 2025 SPECTRE</p>
            <p class="footer-tagline">Built Different. Worn Fearlessly.</p>
        </footer>
    </div>

    <!-- JavaScript -->
    <script src="product-detail.js"></script>
</body>
</html>
