<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- Primary Meta Tags -->
    <title>SPECTRE | Built Different. Worn Fearlessly.</title>
    <meta name="title" content="SPECTRE | Built Different. Worn Fearlessly.">
    <meta name="description" content="Premium streetwear brand. Shop the latest collection, new arrivals, and best sellers. Built Different. Worn Fearlessly.">
    <meta name="keywords" content="SPECTRE, streetwear, luxury fashion, clothing brand, premium streetwear">
    <meta name="author" content="SPECTRE">
    
    <!-- Open Graph / Facebook -->
    <!-- Update URL to your actual domain -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://spectre.com/">
    <meta property="og:title" content="SPECTRE | Built Different. Worn Fearlessly.">
    <meta property="og:description" content="Premium streetwear brand. Shop the latest collection, new arrivals, and best sellers.">
    <meta property="og:image" content="assets/images/logo.png">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://spectre.com/">
    <meta property="twitter:title" content="SPECTRE | Built Different. Worn Fearlessly.">
    <meta property="twitter:description" content="Premium streetwear brand. Shop the latest collection, new arrivals, and best sellers.">
    <meta property="twitter:image" content="assets/images/logo.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-logo">
            <img src="assets/images/logo.png" alt="SPECTRE Logo" class="loading-logo-img">
        </div>
        <div class="loading-bar">
            <div class="loading-progress" id="loadingProgress"></div>
        </div>
    </div>

    <!-- Background Effects -->
    <div class="background-gradient"></div>
    <div class="background-particles"></div>
    <div class="glow-effect"></div>

    <!-- Main Container -->
    <main class="container">
        <!-- Header Section -->
        <header class="header">
            <div class="profile-section">
                <div class="profile-image-container">
                    <img src="assets/images/logo.png" alt="SPECTRE" class="profile-image" id="profileImage">
                    <div class="profile-ring"></div>
                </div>
                <h1 class="brand-title">SPECTRE</h1>
                <p class="tagline">Built Different. Worn Fearlessly.</p>
            </div>
        </header>

        <!-- Link Buttons Section -->
        <!-- CATATAN: Semua link diambil otomatis dari file links.json -->
        <!-- Jangan ubah href="#" di sini. Edit links.json untuk mengubah link -->
        <section class="links-section">
            <div class="link-container">
                <!-- Shop Collection -->
                <!-- data-link="shop" akan mencari properti "shop" di links.json -->
                <a href="#" class="link-button" data-link="shop" target="_blank" rel="noopener">
                    <div class="button-content">
                        <svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <path d="M16 10a4 4 0 0 1-8 0"></path>
                        </svg>
                        <span>Shop Collection</span>
                    </div>
                    <div class="button-glow"></div>
                </a>

                <!-- New Arrivals -->
                <!-- data-link="new-arrivals" akan mencari properti "new_arrivals" di links.json -->
                <a href="#" class="link-button" data-link="new-arrivals" target="_blank" rel="noopener">
                    <div class="button-content">
                        <svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                        </svg>
                        <span>New Arrivals</span>
                    </div>
                    <div class="button-glow"></div>
                </a>

                <!-- Best Sellers -->
                <!-- data-link="best-sellers" akan mencari properti "best_sellers" di links.json -->
                <a href="#" class="link-button" data-link="best-sellers" target="_blank" rel="noopener">
                    <div class="button-content">
                        <svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                        <span>Best Sellers</span>
                    </div>
                    <div class="button-glow"></div>
                </a>

                <!-- Instagram -->
                <!-- data-link="instagram" akan mencari properti "instagram" di links.json -->
                <a href="#" class="link-button" data-link="instagram" target="_blank" rel="noopener">
                    <div class="button-content">
                        <svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                        </svg>
                        <span>Instagram</span>
                    </div>
                    <div class="button-glow"></div>
                </a>

                <!-- TikTok -->
                <!-- data-link="tiktok" akan mencari properti "tiktok" di links.json -->
                <a href="#" class="link-button" data-link="tiktok" target="_blank" rel="noopener">
                    <div class="button-content">
                        <svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path>
                        </svg>
                        <span>TikTok</span>
                    </div>
                    <div class="button-glow"></div>
                </a>

                <!-- WhatsApp -->
                <!-- data-link="whatsapp" akan mencari properti "whatsapp" di links.json -->
                <a href="#" class="link-button" data-link="whatsapp" id="whatsappBtn" target="_blank" rel="noopener">
                    <div class="button-content">
                        <svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                        </svg>
                        <span>WhatsApp</span>
                    </div>
                    <div class="button-glow"></div>
                </a>

                <!-- Contact -->
                <!-- data-link="contact" akan mencari properti "contact" di links.json -->
                <a href="#" class="link-button" data-link="contact" target="_blank" rel="noopener">
                    <div class="button-content">
                        <svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <span>Contact</span>
                    </div>
                    <div class="button-glow"></div>
                </a>

                <!-- Catalog -->
                <!-- data-link="catalog" akan mencari properti "catalog" di links.json -->
                <a href="#" class="link-button" data-link="catalog" target="_blank" rel="noopener">
                    <div class="button-content">
                        <svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                        </svg>
                        <span>Catalog</span>
                    </div>
                    <div class="button-glow"></div>
                </a>

                <!-- Website -->
                <!-- data-link="website" akan mencari properti "website" di links.json -->
                <a href="#" class="link-button" data-link="website" target="_blank" rel="noopener">
                    <div class="button-content">
                        <svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="2" y1="12" x2="22" y2="12"></line>
                            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                        </svg>
                        <span>Website</span>
                    </div>
                    <div class="button-glow"></div>
                </a>
            </div>
        </section>

        <!-- Action Buttons -->
        <section class="actions-section">
            <button class="action-button" id="shareBtn" aria-label="Share Profile">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="18" cy="5" r="3"></circle>
                    <circle cx="6" cy="12" r="3"></circle>
                    <circle cx="18" cy="19" r="3"></circle>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                </svg>
                <span>Share</span>
            </button>
            <button class="action-button" id="copyWhatsappBtn" aria-label="Copy WhatsApp">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                <span>Copy WhatsApp</span>
            </button>
        </section>

        <!-- Footer -->
        <!-- Footer social links juga diambil dari links.json -->
        <footer class="footer">
            <div class="footer-logo">
                <img src="assets/images/logo.png" alt="SPECTRE" class="footer-logo-img">
            </div>
            <div class="footer-social">
                <!-- Instagram footer link -->
                <a href="#" class="social-link" data-link="instagram" target="_blank" rel="noopener" aria-label="Instagram">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                </a>
                <!-- TikTok footer link -->
                <a href="#" class="social-link" data-link="tiktok" target="_blank" rel="noopener" aria-label="TikTok">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path>
                    </svg>
                </a>
                <!-- WhatsApp footer link -->
                <a href="#" class="social-link" data-link="whatsapp" target="_blank" rel="noopener" aria-label="WhatsApp">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                    </svg>
                </a>
            </div>
            <p class="footer-text">&copy; 2024 SPECTRE. All rights reserved.</p>
            <p class="footer-tagline">Designed for the future of streetwear.</p>
        </footer>
    </main>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
